<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
{% block title %}
Simulador de Electromagnetismo
{% endblock %}
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-utn">

<div class="container">

    <a class="navbar-brand navbar-brand-utn" href="/">
        <div>UNIVERSIDAD TECNOLÓGICA NACIONAL</div>
        <div>FACULTAD REGIONAL RESISTENCIA</div>
    </a>

    <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMain"
    >

    <span class="navbar-toggler-icon"></span>

    </button>

    <div
        class="collapse navbar-collapse"
        id="navbarMain"
    >

        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="/">
                    Inicio
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/conductor">
                    Conductor
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Paralelos
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">
                    Bobina
                </a>
            </li>

        </ul>

    </div>

</div>

</nav>

<header class="hero-banner">
    <div class="container">
        <h1>Simulador de Electromagnetismo</h1>
        <p>Física II - Campo Magnético e Inducción</p>
    </div>
</header>

<div class="container">

{% block content %}
{% endblock %}

</div>

<footer class="footer">
    Electromagnetismo Interactivo - Desarrollado por Japo
</footer>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>
